name: Synthetic adapter checks

# Nightly Playwright runs against real LLM platforms. Catches DOM changes
# before users notice. Failures are SEV2 — adapter most likely needs an
# updated selector + fixture.

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch:

# Least-privilege default. The job only reads source and uploads an
# artifact on failure; nothing should write to the repo, push images,
# or alter releases. Tightening here means a compromised dep in the
# Playwright install path cannot exfiltrate the GITHUB_TOKEN.
permissions:
  contents: read

jobs:
  synthetic:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with: { version: 9 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
