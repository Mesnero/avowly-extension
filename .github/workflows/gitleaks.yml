name: Gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Direct args so the exit-code behaviour is unambiguous: --exit-code=1
      # makes a finding fail the workflow step. The OSS-mode GitHub Action
      # only fails when the (commercial) GITLEAKS_LICENSE secret is set,
      # which we don't use.
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --no-banner --redact --verbose --exit-code=1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
