name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [chrome, firefox]
    env:
      # Bake the API origin into the build. Falls back to the public
      # production URL so PRs from forks (where org variables are not
      # exposed) still produce a buildable artifact rather than a
      # bundle that throws at module load.
      #
      # The repo variable `API_BASE_URL` lets the maintainer override
      # this without pushing a code change (e.g. for staging builds).
      WXT_PUBLIC_API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.avowly.io' }}
      # Never enable verbose console logging in CI-produced artifacts.
      # env.ts refuses to build a `MODE === 'production'` bundle with
      # this set to true; we keep it explicit anyway.
      WXT_PUBLIC_DEBUG: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Lint
        if: matrix.target == 'chrome'
        run: pnpm lint

      - name: Typecheck
        if: matrix.target == 'chrome'
        run: pnpm typecheck

      - name: Test
        if: matrix.target == 'chrome'
        run: pnpm test

      - name: Upload coverage report
        if: matrix.target == 'chrome' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore

      - name: Build (${{ matrix.target }})
        run: |
          if [ "${{ matrix.target }}" = "firefox" ]; then
            pnpm build:firefox
          else
            pnpm build
          fi

      - name: Bundle size check
        if: matrix.target == 'chrome'
        run: pnpm size

      - name: Zip extension
        run: |
          if [ "${{ matrix.target }}" = "firefox" ]; then
            pnpm zip:firefox
          else
            pnpm zip
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avowly-${{ matrix.target }}
          path: .output/*.zip
          retention-days: 14

  format-check:
    name: Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  audit:
    name: pnpm audit (production deps)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Production deps only — devDependency advisories rarely affect a
      # built artifact and Renovate keeps both groups patched separately.
      - run: pnpm audit --prod --audit-level=high
